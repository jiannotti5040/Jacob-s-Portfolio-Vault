<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 420" font-family="system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#5cc8ff"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1320"/><stop offset="1" stop-color="#080b11"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1060" height="420" rx="18" fill="url(#bg)"/>
  <text x="32" y="42" fill="#5cc8ff" font-size="21" font-weight="700" letter-spacing="2">CHIRON — one input's journey</text>
  <text x="32" y="65" fill="#8593a8" font-size="13">From a raw surface to a proven, filed, reusable rule — and the ability to speak it back.</text>

  <!-- stage boxes -->
  <g>
    <rect x="32" y="96" width="150" height="74" rx="10" fill="#10151f" stroke="#243248"/>
    <text x="46" y="124" fill="#c4cedd" font-size="13" font-weight="700">1 · Surface</text>
    <text x="46" y="146" fill="#8593a8" font-size="11.5">sequence, cipher,</text>
    <text x="46" y="161" fill="#8593a8" font-size="11.5">code, text, grid…</text>

    <rect x="214" y="96" width="150" height="74" rx="10" fill="#0e1a16" stroke="#2b5444"/>
    <text x="228" y="124" fill="#7ee0b8" font-size="13" font-weight="700">2 · collapse</text>
    <text x="228" y="146" fill="#8593a8" font-size="11.5">smallest rule (MDL),</text>
    <text x="228" y="161" fill="#8593a8" font-size="11.5">exact arithmetic</text>

    <rect x="396" y="96" width="150" height="74" rx="10" fill="#16130c" stroke="#5a4a26"/>
    <text x="410" y="124" fill="#ffcf86" font-size="13" font-weight="700">3 · verify</text>
    <text x="410" y="146" fill="#8593a8" font-size="11.5">predict held-out</text>
    <text x="410" y="161" fill="#8593a8" font-size="11.5">terms — exact?</text>

    <rect x="578" y="60" width="170" height="64" rx="10" fill="#0e1a16" stroke="#2b5444"/>
    <text x="592" y="86" fill="#7ee0b8" font-size="12.5" font-weight="700">INTEGRAL</text>
    <text x="592" y="106" fill="#8593a8" font-size="11.5">verified · law library</text>

    <rect x="578" y="142" width="170" height="64" rx="10" fill="#11161f" stroke="#2c3850"/>
    <text x="592" y="168" fill="#c4cedd" font-size="12.5" font-weight="700">GENERAL</text>
    <text x="592" y="188" fill="#8593a8" font-size="11.5">kept as knowledge</text>

    <rect x="780" y="96" width="150" height="74" rx="10" fill="#10151f" stroke="#243248"/>
    <text x="794" y="120" fill="#c4cedd" font-size="13" font-weight="700">4 · file</text>
    <text x="794" y="142" fill="#8593a8" font-size="11.5">sort into a domain</text>
    <text x="794" y="157" fill="#8593a8" font-size="11.5">(by subject)</text>

    <rect x="780" y="236" width="248" height="64" rx="10" fill="#16101f" stroke="#3a2b58"/>
    <text x="794" y="262" fill="#b69cff" font-size="12.5" font-weight="700">5 · grow a concept</text>
    <text x="794" y="282" fill="#8593a8" font-size="11.5">if the rule recurs in a 2nd subject</text>

    <rect x="396" y="236" width="248" height="64" rx="10" fill="#0d1320" stroke="#243248"/>
    <text x="410" y="262" fill="#9ad8ff" font-size="12.5" font-weight="700">6 · articulate</text>
    <text x="410" y="282" fill="#8593a8" font-size="11.5">speak the rule back: regenerate / re-voice</text>

    <rect x="32" y="236" width="248" height="64" rx="10" fill="#10151f" stroke="#243248"/>
    <text x="46" y="262" fill="#7ee0b8" font-size="12.5" font-weight="700">certificate</text>
    <text x="46" y="282" fill="#8593a8" font-size="11.5">found · why believed · what falsifies it</text>
  </g>

  <!-- arrows -->
  <line x1="182" y1="133" x2="212" y2="133" stroke="#5cc8ff" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="364" y1="133" x2="394" y2="133" stroke="#5cc8ff" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="546" y1="120" x2="576" y2="96" stroke="#7ee0b8" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="546" y1="146" x2="576" y2="172" stroke="#8593a8" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="748" y1="96" x2="800" y2="96" stroke="#5cc8ff" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="748" y1="174" x2="800" y2="132" stroke="#5cc8ff" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="855" y1="170" x2="900" y2="234" stroke="#b69cff" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="780" y1="268" x2="646" y2="268" stroke="#9ad8ff" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="396" y1="268" x2="282" y2="268" stroke="#5cc8ff" stroke-width="2" marker-end="url(#a2)"/>
  <text x="556" y="56" fill="#7ee0b8" font-size="10.5">exact ✓</text>
  <text x="556" y="210" fill="#8593a8" font-size="10.5">not exact</text>
</svg>
