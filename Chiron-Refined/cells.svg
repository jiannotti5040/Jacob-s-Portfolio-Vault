<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1010" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="cyto" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#101a28"/><stop offset="0.7" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0f18"/>
    </radialGradient>
    <radialGradient id="nuc" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#1b3550"/><stop offset="1" stop-color="#0e1c2c"/>
    </radialGradient>
    <linearGradient id="bgc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c111b"/><stop offset="1" stop-color="#080b11"/></linearGradient>
  </defs>
  <rect width="1000" height="1010" fill="url(#bgc)"/>
  <text x="40" y="46" fill="#5cc8ff" font-size="22" font-weight="700" letter-spacing="2">CHIRON — The Cells</text>
  <text x="40" y="70" fill="#8ea0ba" font-size="14">One organism: a single Omega origin, eight nuclei, a Congress cytoplasm, all inside one membrane of law.</text>

  <!-- membrane -->
  <circle cx="500" cy="545" r="430" fill="url(#cyto)" stroke="#2f5aa0" stroke-width="2.5"/>
  <circle cx="500" cy="545" r="430" fill="none" stroke="#1c2c48" stroke-width="10" opacity="0.5"/>
  <text x="500" y="135" fill="#8ea0ba" font-size="12.5" text-anchor="middle" letter-spacing="1">MEMBRANE — Laws L1–L8 · one membrane · two destinations · single store · single script · no network · determinism · provenance · bounded self-mod</text>

  <!-- intake pore (the well) -->
  <circle cx="500" cy="115" r="14" fill="#0a0f18" stroke="#5cc8ff" stroke-width="2"/>
  <text x="524" y="112" fill="#5cc8ff" font-size="12">intake · the well (single inbound)</text>
  <line x1="500" y1="129" x2="500" y2="300" stroke="#5cc8ff" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.6"/>

  <!-- congress cytoplasm ring label + bodies -->
  <text x="500" y="545" fill="#3c4a63" font-size="12" text-anchor="middle" opacity="0">.</text>
  <g font-size="11.5" fill="#b69cff" text-anchor="middle">
    <circle cx="500" cy="300" r="7" fill="#16101f" stroke="#5a4488"/><text x="500" y="288">Vault</text>
    <circle cx="710" cy="380" r="7" fill="#16101f" stroke="#5a4488"/><text x="724" y="372" text-anchor="start">Law Library</text>
    <circle cx="760" cy="640" r="7" fill="#16101f" stroke="#5a4488"/><text x="774" y="636" text-anchor="start">Crystal</text>
    <circle cx="300" cy="700" r="7" fill="#16101f" stroke="#5a4488"/><text x="286" y="696" text-anchor="end">Bank</text>
    <circle cx="270" cy="380" r="7" fill="#16101f" stroke="#5a4488"/><text x="256" y="372" text-anchor="end">Merkle root</text>
  </g>
  <text x="500" y="978" fill="#b69cff" font-size="12.5" text-anchor="middle">THE CONGRESS (cytoplasm) — domains · vault · law library · crystal · bank · sealed Merkle provenance · tiered, portable, keyed</text>

  <!-- connectors from origin to nuclei -->
  <g stroke="#2c3b56" stroke-width="1.5">
    <line x1="500" y1="545" x2="500" y2="320"/><line x1="500" y1="545" x2="690" y2="405"/>
    <line x1="500" y1="545" x2="765" y2="545"/><line x1="500" y1="545" x2="690" y2="685"/>
    <line x1="500" y1="545" x2="500" y2="770"/><line x1="500" y1="545" x2="310" y2="685"/>
    <line x1="500" y1="545" x2="235" y2="545"/><line x1="500" y1="545" x2="310" y2="405"/>
  </g>

  <!-- eight nuclei (organelles) -->
  <g text-anchor="middle">
    <g fill="#eaf0f8" font-size="12.5">
      <circle cx="500" cy="320" r="62" fill="#0c1512" stroke="#2b5444"/><text x="500" y="316">Invariant</text><text x="500" y="333">Engine</text>
      <circle cx="690" cy="405" r="62" fill="#141b28" stroke="#2c3850"/><text x="690" y="401">Wisdom</text><text x="690" y="418">Candor</text>
      <circle cx="765" cy="545" r="62" fill="#141b28" stroke="#2c3850"/><text x="765" y="541">Certify</text><text x="765" y="558">JDICert</text>
      <circle cx="690" cy="685" r="62" fill="#141b28" stroke="#2c3850"/><text x="690" y="681">Twin</text><text x="690" y="698">Discovery</text>
      <circle cx="500" cy="770" r="62" fill="#141b28" stroke="#2c3850"/><text x="500" y="766">Growth</text><text x="500" y="783">Engine</text>
      <circle cx="310" cy="685" r="62" fill="#141b28" stroke="#2c3850"/><text x="310" y="681">Discovery</text><text x="310" y="698">Ledger</text>
      <circle cx="235" cy="545" r="62" fill="#141b28" stroke="#2c3850"/><text x="235" y="541">Self-</text><text x="235" y="558">Critique</text>
      <circle cx="310" cy="405" r="62" fill="#141b28" stroke="#2c3850"/><text x="310" y="401">Field</text><text x="310" y="418">UMA/RSLS</text>
    </g>
  </g>

  <!-- Omega origin nucleus -->
  <circle cx="500" cy="545" r="92" fill="url(#nuc)" stroke="#5cc8ff" stroke-width="2.5"/>
  <text x="500" y="535" fill="#5cc8ff" font-size="44" font-weight="700" text-anchor="middle">&#937;</text>
  <text x="500" y="565" fill="#eaf0f8" font-size="13" text-anchor="middle" font-weight="700">Omega origin</text>
  <text x="500" y="583" fill="#8ea0ba" font-size="11" text-anchor="middle">the one organism</text>

  <!-- President vesicle reaching through the membrane -->
  <circle cx="828" cy="828" r="44" fill="#1a1410" stroke="#ffcf86" stroke-width="2"/>
  <text x="828" y="824" fill="#ffcf86" font-size="12" text-anchor="middle">President</text>
  <text x="828" y="841" fill="#8ea0ba" font-size="10.5" text-anchor="middle">executive</text>
  <line x1="690" y1="685" x2="800" y2="800" stroke="#2c3b56" stroke-width="1.5"/>
  <line x1="864" y1="864" x2="930" y2="930" stroke="#5a3a22" stroke-width="2" stroke-dasharray="5 4"/>
  <rect x="828" y="930" width="150" height="44" rx="10" fill="#141018" stroke="#5a3a22" stroke-dasharray="5 4"/>
  <text x="903" y="950" fill="#ffcf86" font-size="11" text-anchor="middle">free public archives</text>
  <text x="903" y="966" fill="#8ea0ba" font-size="10" text-anchor="middle">NETWORK OFF · operator-gated</text>
</svg>
