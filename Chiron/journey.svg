<svg viewBox="0 0 940 360" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6470"/></marker>
  </defs>
  <rect width="940" height="360" fill="#ffffff"/>
  <text x="470" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1b1f24">One input's journey</text>
  <text x="470" y="50" text-anchor="middle" font-size="12.5" fill="#5b6470">a real example: the surface 1 1 2 3 5 8 13 goes in; a proven rule comes out</text>

  <!-- step boxes -->
  <rect x="20" y="80" width="150" height="74" rx="9" fill="#f4f6f8" stroke="#5b6470"/>
  <text x="95" y="104" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1b1f24">surface</text>
  <text x="95" y="126" text-anchor="middle" font-size="12" fill="#3a4149" font-family="monospace">1 1 2 3 5 8 13</text>
  <text x="95" y="144" text-anchor="middle" font-size="10.5" fill="#8a9099">7 terms shown</text>

  <rect x="200" y="80" width="160" height="74" rx="9" fill="#eef3fb" stroke="#1f6feb"/>
  <text x="280" y="104" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f4fa3">collapse</text>
  <text x="280" y="125" text-anchor="middle" font-size="11" fill="#3a4149">rank candidates by MDL;</text>
  <text x="280" y="141" text-anchor="middle" font-size="11" fill="#3a4149">winner: recurrence aₙ=aₙ₋₁+aₙ₋₂</text>

  <rect x="390" y="80" width="160" height="74" rx="9" fill="#eef3fb" stroke="#1f6feb" stroke-width="2"/>
  <text x="470" y="104" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f4fa3">verify</text>
  <text x="470" y="125" text-anchor="middle" font-size="11" fill="#3a4149">train on first 5, predict</text>
  <text x="470" y="141" text-anchor="middle" font-size="11" fill="#3a4149">8, 13 — exact match ✓</text>

  <rect x="580" y="80" width="160" height="74" rx="9" fill="#eaf6ee" stroke="#2ea043"/>
  <text x="660" y="104" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a7f37">certificate</text>
  <text x="660" y="125" text-anchor="middle" font-size="11" fill="#3a4149">what found / why /</text>
  <text x="660" y="141" text-anchor="middle" font-size="11" fill="#3a4149">what would falsify</text>

  <rect x="770" y="80" width="150" height="74" rx="9" fill="#f4f6f8" stroke="#5b6470"/>
  <text x="845" y="104" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1b1f24">filed</text>
  <text x="845" y="125" text-anchor="middle" font-size="11" fill="#3a4149">integral law, by</text>
  <text x="845" y="141" text-anchor="middle" font-size="11" fill="#3a4149">subject, in Congress</text>

  <line x1="170" y1="117" x2="198" y2="117" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="360" y1="117" x2="388" y2="117" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="550" y1="117" x2="578" y2="117" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="740" y1="117" x2="768" y2="117" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- outputs row -->
  <rect x="200" y="214" width="240" height="70" rx="9" fill="#eef3fb" stroke="#1f6feb"/>
  <text x="320" y="238" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f4fa3">articulate (the codec)</text>
  <text x="320" y="259" text-anchor="middle" font-size="11" fill="#3a4149">run collapse in reverse — extend the</text>
  <text x="320" y="274" text-anchor="middle" font-size="11" fill="#3a4149">rule: 21, 34, 55, … in its own language</text>

  <rect x="500" y="214" width="240" height="70" rx="9" fill="#fdf3e6" stroke="#bf8700"/>
  <text x="620" y="238" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a6700">had it NOT verified</text>
  <text x="620" y="259" text-anchor="middle" font-size="11" fill="#3a4149">the surface returns as a classified</text>
  <text x="620" y="274" text-anchor="middle" font-size="11" fill="#3a4149">residual — abstain, never a guess</text>

  <line x1="470" y1="154" x2="470" y2="190" stroke="#5b6470" stroke-width="1.5"/>
  <line x1="470" y1="190" x2="320" y2="190" stroke="#5b6470" stroke-width="1.5"/>
  <line x1="320" y1="190" x2="320" y2="212" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="470" y1="190" x2="620" y2="190" stroke="#bf8700" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="620" y1="190" x2="620" y2="212" stroke="#bf8700" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <text x="470" y="324" text-anchor="middle" font-size="11.5" fill="#8a9099">every step is exact and offline; the certificate is reproducible byte-for-byte on the same version</text>
</svg>
