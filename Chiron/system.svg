<svg viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6470"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1a7f37"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9a6700"/></marker>
  </defs>
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1b1f24">How Chiron works</text>
  <text x="460" y="53" text-anchor="middle" font-size="12.5" fill="#5b6470">recover the exact rule beneath a surface — prove it, or abstain. Offline · deterministic · exact arithmetic</text>

  <rect x="24" y="92" width="158" height="120" rx="9" fill="#f4f6f8" stroke="#5b6470"/>
  <text x="103" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b1f24">1 · Surface</text>
  <text x="103" y="137" text-anchor="middle" font-size="11.5" fill="#3a4149">integer sequence</text>
  <text x="103" y="155" text-anchor="middle" font-size="11.5" fill="#3a4149">ciphertext · string</text>
  <text x="103" y="173" text-anchor="middle" font-size="11.5" fill="#3a4149">graph · code</text>
  <text x="103" y="195" text-anchor="middle" font-size="11" fill="#8a9099">anything codified</text>

  <rect x="214" y="92" width="170" height="120" rx="9" fill="#eef3fb" stroke="#1f6feb"/>
  <text x="299" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f4fa3">2 · Collapse</text>
  <text x="299" y="137" text-anchor="middle" font-size="11.5" fill="#3a4149">search hypothesis</text>
  <text x="299" y="155" text-anchor="middle" font-size="11.5" fill="#3a4149">classes; pick the</text>
  <text x="299" y="173" text-anchor="middle" font-size="11.5" fill="#3a4149">minimal rule (MDL)</text>
  <text x="299" y="195" text-anchor="middle" font-size="11" fill="#8a9099">exact fractions</text>

  <rect x="416" y="92" width="170" height="120" rx="9" fill="#eef3fb" stroke="#1f6feb" stroke-width="2"/>
  <text x="501" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f4fa3">3 · Verify</text>
  <text x="501" y="139" text-anchor="middle" font-size="11.5" fill="#3a4149">predict held-out</text>
  <text x="501" y="157" text-anchor="middle" font-size="11.5" fill="#3a4149">terms it never saw</text>
  <text x="501" y="179" text-anchor="middle" font-size="11" fill="#8a9099">exact equality,</text>
  <text x="501" y="194" text-anchor="middle" font-size="11" fill="#8a9099">not tolerance</text>

  <rect x="636" y="60" width="172" height="86" rx="9" fill="#eaf6ee" stroke="#2ea043"/>
  <text x="722" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1a7f37">4 · Certify &amp; file</text>
  <text x="722" y="103" text-anchor="middle" font-size="11.5" fill="#3a4149">signed certificate;</text>
  <text x="722" y="120" text-anchor="middle" font-size="11.5" fill="#3a4149">integral law / general</text>
  <text x="722" y="137" text-anchor="middle" font-size="11.5" fill="#3a4149">knowledge, by subject</text>

  <rect x="636" y="160" width="172" height="64" rx="9" fill="#fdf3e6" stroke="#bf8700"/>
  <text x="722" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#9a6700">Abstain</text>
  <text x="722" y="205" text-anchor="middle" font-size="11.5" fill="#3a4149">classified residual —</text>
  <text x="722" y="220" text-anchor="middle" font-size="11.5" fill="#3a4149">no rule fabricated</text>

  <rect x="214" y="300" width="372" height="74" rx="9" fill="#f4f6f8" stroke="#5b6470"/>
  <text x="400" y="325" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b1f24">5 · Congress — growable memory</text>
  <text x="400" y="346" text-anchor="middle" font-size="11.5" fill="#3a4149">verified laws · domains · provenance · owner-signed Merkle root</text>
  <text x="400" y="363" text-anchor="middle" font-size="11" fill="#8a9099">pools across instances without trust · compacts to stay portable</text>

  <rect x="636" y="300" width="172" height="74" rx="9" fill="#eef3fb" stroke="#1f6feb"/>
  <text x="722" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#1f4fa3">6 · Reuse &amp; grow</text>
  <text x="722" y="346" text-anchor="middle" font-size="11.5" fill="#3a4149">recognize on sight,</text>
  <text x="722" y="362" text-anchor="middle" font-size="11.5" fill="#3a4149">articulate, cross-domain</text>

  <line x1="182" y1="152" x2="212" y2="152" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="384" y1="152" x2="414" y2="152" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="586" y1="130" x2="634" y2="103" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="612" y="112" font-size="10.5" fill="#1a7f37" font-weight="700">verified</text>
  <line x1="586" y1="172" x2="634" y2="190" stroke="#9a6700" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="598" y="184" font-size="10.5" fill="#9a6700" font-weight="700">no proof</text>

  <line x1="722" y1="146" x2="722" y2="232" stroke="#5b6470" stroke-width="1.5"/>
  <line x1="722" y1="232" x2="588" y2="232" stroke="#5b6470" stroke-width="1.5"/>
  <line x1="430" y1="232" x2="430" y2="298" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="500" y="248" text-anchor="middle" font-size="10.5" fill="#8a9099">filed</text>
  <line x1="586" y1="337" x2="634" y2="337" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="722" y1="298" x2="722" y2="270" stroke="#1f6feb" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="722" y1="270" x2="299" y2="270" stroke="#1f6feb" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="299" y1="270" x2="299" y2="214" stroke="#1f6feb" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="430" y="265" text-anchor="middle" font-size="10" fill="#1f6feb">known rules recognized, not re-earned</text>

  <text x="460" y="420" text-anchor="middle" font-size="12.5" fill="#1b1f24" font-weight="700">Measured: 22/29 OEIS-core recovered · 42/44 ciphers · 0 false positives across ~5,070 cases</text>
  <text x="460" y="440" text-anchor="middle" font-size="11" fill="#8a9099">the only network is the operator-directed grower, and only when you run it</text>
</svg>
